name: Release Windows build

# Builds the single-file Horizon.exe on a Windows runner and publishes it as
# a GitHub Release asset whenever a version tag (e.g. v1.2.0) is pushed.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --release

      # .cargo/config.toml statically links the MSVC C runtime, so the exe
      # has no VC++ Redistributable dependency; static/ is embedded by
      # rust-embed in release builds. The result is one self-contained file.
      - name: Build Horizon.exe
        run: cargo build --release

      - name: Stage versioned release asset
        run: Copy-Item target/release/Horizon.exe "Horizon-${{ github.ref_name }}.exe"

      # Two names for the same file: the versioned one for the release
      # archive, and a stable "Horizon.exe" so that
      #   .../releases/latest/download/Horizon.exe
      # is a permanent URL for scripted installs (see README).
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Horizon-${{ github.ref_name }}.exe
            target/release/Horizon.exe
          generate_release_notes: true
