<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Planner — Adaptive Task Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- App Container -->
    <div class="app-container">
        <!-- Sidebar or Header -->
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Horizon</h1>
                    <span class="badge">Workspace</span>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="add-task-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Task
                </button>
            </div>
        </header>

        <!-- Main Workspace Area -->
        <main class="workspace">
            <!-- 5 Work Days Columns -->
            <section class="weekly-planner">
                <div class="section-title">
                    <h2>Upcoming Horizon</h2>
                    <span class="subtext">Next 5 work days</span>
                </div>
                <div class="columns-grid" id="week-columns">
                    <!-- Dynamic column rendering -->
                </div>
            </section>

            <!-- Backlog Section -->
            <section class="backlog-section">
                <div class="section-title">
                    <div class="title-with-counter">
                        <h2>Backlog</h2>
                        <span class="counter" id="backlog-counter">0</span>
                    </div>
                    <span class="subtext">Tasks without scheduled dates or set for later</span>
                </div>
                
                <div class="backlog-container" id="backlog-dropzone">
                    <div class="backlog-empty-state" id="backlog-empty-msg">
                        <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                        <p>No tasks in backlog</p>
                        <span>Drag tasks here or create a new task designated for the backlog.</span>
                    </div>
                    <div class="backlog-list" id="backlog-tasks-container">
                        <!-- Dynamic backlog cards -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Task Modal (Add/Edit) -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Create Task</h3>
                <button class="modal-close" id="modal-close-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id-field">
                
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" placeholder="Add some details..." rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-date">Scheduled Date</label>
                        <select id="task-date">
                            <!-- Populated dynamically: Backlog + 5 upcoming work days -->
                        </select>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modal-submit-btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
