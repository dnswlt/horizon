<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Planner — Adaptive Task Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- App Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="1" y1="18" x2="23" y2="18"></line>
                        <path d="M6 18a6 6 0 0 1 12 0"></path>
                        <line x1="12" y1="4" x2="12" y2="8"></line>
                        <line x1="4" y1="8" x2="6" y2="10"></line>
                        <line x1="20" y1="8" x2="18" y2="10"></line>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Horizon</h1>
                </div>
            </div>
            
            <!-- Tabs Navigation inside Header (Center) -->
            <div class="workspace-tabs">
                <button class="tab-btn active" id="tab-planner" data-tab="planner">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <line x1="15" y1="3" x2="15" y2="21"></line>
                    </svg>
                    Board
                </button>
                <button class="tab-btn" id="tab-archive" data-tab="archive">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="21 8 21 21 3 21 3 8"></polyline>
                        <rect x="1" y="3" width="22" height="5"></rect>
                        <line x1="10" y1="12" x2="14" y2="12"></line>
                    </svg>
                    Archive
                </button>
            </div>
            
            <div class="header-actions">
                <button id="toggle-completed-btn" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span>Show Completed</span>
                </button>

                <button id="add-task-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Task
                </button>
            </div>
        </header>

        <!-- Main Workspace Area -->
        <main class="workspace">
            <!-- Tab Content: Planner View -->
            <div id="view-planner" class="tab-view active">
                <section class="weekly-planner">
                    <div class="columns-grid" id="week-columns">
                        <!-- Dynamic column rendering -->
                    </div>
                </section>

                <section class="backlog-section">
                    <div class="section-title">
                        <div class="title-with-counter">
                            <h2>Backlog</h2>
                            <span class="counter" id="backlog-counter">0</span>
                        </div>
                    </div>
                    
                    <div class="backlog-container" id="backlog-dropzone">
                        <div class="backlog-empty-state" id="backlog-empty-msg">
                            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6"></line>
                                <line x1="8" y1="12" x2="21" y2="12"></line>
                                <line x1="8" y1="18" x2="21" y2="18"></line>
                                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                <line x1="3" y1="18" x2="3.01" y2="18"></line>
                            </svg>
                            <p>No tasks in backlog</p>
                            <span>Drag tasks here or create a new task designated for the backlog.</span>
                        </div>
                        <div class="backlog-list" id="backlog-tasks-container">
                            <!-- Dynamic backlog cards -->
                        </div>
                    </div>
                </section>
            </div>

            <div id="view-archive" class="tab-view">
                <section class="archive-section">
                    <div class="section-title">
                        <h2>Archive</h2>
                    </div>
                    <div class="archive-list-container">
                        <div id="archive-empty-msg" class="archive-empty">
                            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="21 8 21 21 3 21 3 8"></polyline>
                                <rect x="1" y="3" width="22" height="5"></rect>
                                <line x1="10" y1="12" x2="14" y2="12"></line>
                            </svg>
                            <p>Archive is empty</p>
                            <span>Completed tasks will be saved here.</span>
                        </div>
                        <div class="archive-items" id="archive-items-container">
                        </div>
                        <div id="archive-load-more-container" style="display: none; justify-content: center; margin-top: 1rem;">
                            <button id="btn-load-more-archive" class="btn btn-secondary" style="font-size: 0.80rem; padding: 0.4rem 1rem;">Load More</button>
                        </div>
                    </div>
                </section>

                <section class="deleted-section">
                    <div class="section-title">
                        <h2>Deleted</h2>
                    </div>
                    <div class="archive-list-container">
                        <div id="deleted-empty-msg" class="archive-empty">
                            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                            <p>Trash is empty</p>
                            <span>Deleted tasks will be saved here.</span>
                        </div>
                        <div class="archive-items" id="deleted-items-container">
                        </div>
                        <div id="deleted-load-more-container" style="display: none; justify-content: center; margin-top: 1rem;">
                            <button id="btn-load-more-deleted" class="btn btn-secondary" style="font-size: 0.80rem; padding: 0.4rem 1rem;">Load More</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Task Modal (Add/Edit) -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Create Task</h3>
                <button class="modal-close" id="modal-close-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id-field">
                
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" placeholder="Add some details..." rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-date">Scheduled Date</label>
                        <div class="date-input-container">
                            <input type="date" id="task-date">
                            <button type="button" class="btn btn-secondary" id="clear-date-btn" title="Move to backlog">Clear</button>
                        </div>
                        <div class="quick-dates">
                        </div>
                        <span class="help-text">Leave blank to place task in the Backlog</span>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="modal-submit-btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
